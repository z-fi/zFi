# Render Blueprint — an always-on static MIRROR of the zFi dapp.
#
# Why this exists: zfi.wei.is (the Cloudflare-fronted wei.is gateway) rate-limits.
# IPFS remains the canonical, uninterruptible source — the content is reachable via
# any ENS/IPFS gateway. Render is just one more centralized access path that is not
# subject to the CF gateway's rate limits. It does NOT replace the IPFS deployment.
#
# The backend APIs (proxy-metadata, quotes) stay on their Cloudflare Workers
# (zfi-pin.*.workers.dev, api.zfi.wei.is) and are unaffected by this.
#
# Pure static: dapp/ is the web root, vendor/ is pre-bundled, so there is no build.
services:
  - type: web
    name: zfi
    runtime: static
    staticPublishPath: dapp
    buildCommand: echo "no build — static assets are committed"
    pullRequestPreviewsEnabled: false
    headers:
      # Mirror the dev server's permissive CORS so other origins (e.g. the IPFS
      # copy) can fetch token-list.json and other assets from this mirror.
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
