[profile.default]
solc = "0.8.34"
via_ir = true
optimizer = true
optimizer_runs = 9_999_999

# Override with FOUNDRY_ETH_RPC_URL env var for faster RPC.
eth_rpc_url = "https://1rpc.io/eth"
fork_block_number = 24_880_000
no_rpc_rate_limit = true

# zQuoter needs low runs + yul=false to stay under EIP-170 (24,576 bytes)
[profile.zquoter]
src = "src"
test = "test"
via_ir = true
optimizer = true
optimizer_runs = 20

[profile.zquoter.optimizer_details]
yul = false
